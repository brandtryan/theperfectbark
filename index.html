<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-title" content="The Perfect Bark" />
  <title>The Perfect Bark</title>
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <!-- <link rel="stylesheet" href="src/styles.css" /> -->
  <script src="./src/main.mjs" type="module"></script>
  <script src="./src/components/page-component.mjs" type="module"></script>
  <style>
    @font-face {
      font-family: Ikarus;
      src: url("Ikarus.woff2") format("woff2-variations");
      font-style: normal;
      font-display: swap;
      unicode-range: U+00-7F, U+2014;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -moz-text-size-adjust: none;
      -webkit-text-size-adjust: none;
      text-size-adjust: none;
      padding: 0;
      background-color: #37383b;
      color: gold;
      font-size: 62.5%;
      font-synthesis: none;
      font-feature-settings:
        "case" 1,
        "liga" 1,
        "ss02" 1,
        "ss03" 1,
        "ss04" 1,
        "ss11" 1,
        "ss13" 1,
        "ss17" 1,
        "ss18" 1;
      font-variation-settings: "ital" 0, "cont" 0;
      font-weight: 400;
      font-stretch: 100%;
    }

    body,
    section,
    h1,
    h2,
    h3,
    h4,
    p {
      margin-block-start: 0;
      margin-block-end: 0;
      margin-top: 0;
      margin-right: 0;
      margin-bottom: 0;
      margin-left: 0;
    }

    img,
    picture {
      max-width: 100%;
      display: block;
    }

    input,
    button,
    select {
      font-family: inherit;
      font-size: inherit;
    }

    body {
      font-family: Ikarus;
      font-size: clamp(1.6rem, 0.75cqi + 1.24rem, 2.2rem);
    }

    .page {
      container: page / size;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-content: center;
      border: 2px solid pink;
    }
  </style>
</head>

<body>
  <div class="page">

  </div>

</body>

</html>
